# One-time setup, before first `docker compose up`:
#   docker network create schloss-net
# This lets schlussel, schloss, and kuvert reach each other by service
# name (e.g. http://schlussel:4000) regardless of which repo's compose
# file started them.
#
# Neither service publishes a host port - both are reached through the
# tor gateway (see https://github.com/zudaR107/tor), which is the only
# container that binds to a host port. `schlussel-data` is given a fixed
# name so it's the same physical volume whether this compose file is run
# standalone or included from tor's.
services:
  schlussel:
    build:
      context: .
      # This is a pnpm workspace (schlussel at root, web/) - even though
      # this image never uses @zudar107/schloss-ui itself, pnpm's
      # frozen-lockfile install fetches every package in the lockfile to
      # verify it, so it still needs GitHub Packages auth. NODE_AUTH_TOKEN
      # must be set in the shell/`.env` running `docker compose build`.
      secrets:
        - npm_token
    restart: unless-stopped
    volumes:
      - schlussel-data:/data
    environment:
      - DATABASE_PATH=/data/schlussel.db
      - KEYS_DIR=/data/keys
      - PORT=4000
      - JWT_ISSUER=schlussel
      # Substitution var is SCHLUSSEL_ALLOWED_ORIGINS, not ALLOWED_ORIGINS -
      # when tor's docker-compose.yml includes this file alongside kuvert's,
      # both used to read the exact same outer variable name, so one shared
      # .env value silently overrode the other. Container-internal env var
      # name is still plain ALLOWED_ORIGINS below - only the outer name
      # changed.
      - ALLOWED_ORIGINS=${SCHLUSSEL_ALLOWED_ORIGINS:-https://localhost,https://auth.localhost}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3
    networks:
      - schloss-net

  schlussel-web:
    build:
      context: .
      dockerfile: web/Dockerfile
      args:
        VITE_ALLOWED_RETURN_ORIGINS: ${ALLOWED_RETURN_ORIGINS:-https://localhost,https://kuvert.localhost}
        VITE_DEFAULT_APP_URL: ${DEFAULT_APP_URL:-https://localhost}
      # @zudar107/schloss-ui is on GitHub Packages - even though it's
      # public, installing it still requires auth.
      secrets:
        - npm_token
    restart: unless-stopped
    networks:
      - schloss-net

volumes:
  schlussel-data:
    name: schlussel-data

secrets:
  npm_token:
    environment: NODE_AUTH_TOKEN

networks:
  schloss-net:
    external: true
