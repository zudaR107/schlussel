services:
  schlussel:
    build: .
    restart: unless-stopped
    ports:
      - "4000:4000"
    volumes:
      - schlussel-data:/data
    environment:
      - DATABASE_PATH=/data/schlussel.db
      - KEYS_DIR=/data/keys
      - PORT=4000
      - JWT_ISSUER=schlussel
      - ALLOWED_ORIGINS=${ALLOWED_ORIGINS:-http://localhost:3000,http://localhost:5173}
    healthcheck:
      test: ["CMD", "wget", "-qO-", "http://localhost:4000/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  schlussel-data:
