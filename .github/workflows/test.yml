name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v7

      # Pinned exactly - "version: 11" lets the action self-update to
      # whatever the latest 11.x is at run time, which broke CI when
      # pnpm 11.12.0 shipped with an internal bug in the self-installer
      # ("Cannot use 'in' operator to search for 'integrity' in
      # undefined"), unrelated to any change in this repo.
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      # registry-url/scope make setup-node write a user-level .npmrc with
      # an env-var-expanded auth line - pnpm refuses to expand env vars
      # in a *project* .npmrc's auth line (to stop a malicious committed
      # .npmrc from exfiltrating a token to an attacker registry), so
      # this can't just be the committed .npmrc + NODE_AUTH_TOKEN. The
      # workspace install below touches web's dependencies too (no
      # --filter), so this job needs the same auth as the web job.
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@zudar107'

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm --filter schlussel lint
      - run: pnpm --filter schlussel test

  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: read
    steps:
      - uses: actions/checkout@v4

      # Pinned exactly - "version: 11" lets the action self-update to
      # whatever the latest 11.x is at run time, which broke CI when
      # pnpm 11.12.0 shipped with an internal bug in the self-installer
      # ("Cannot use 'in' operator to search for 'integrity' in
      # undefined"), unrelated to any change in this repo.
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      # @zudar107/schloss-ui is on GitHub Packages, not npmjs.com - even
      # though the package is public, installing it still requires auth.
      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm
          registry-url: https://npm.pkg.github.com
          scope: '@zudar107'

      - run: pnpm install --frozen-lockfile
        env:
          NODE_AUTH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
      - run: pnpm --filter web lint
      - run: pnpm --filter web test
