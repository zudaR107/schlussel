name: Test

on:
  push:
    branches: [main]
  pull_request:

jobs:
  api:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # schloss-ui is a git submodule - the workspace install below
      # touches it too (no --filter), even though the API never imports
      # from it.
      - uses: actions/checkout@v7
        with:
          submodules: recursive

      # Pinned exactly - "version: 11" lets the action self-update to
      # whatever the latest 11.x is at run time, which broke CI when
      # pnpm 11.12.0 shipped with an internal bug in the self-installer
      # ("Cannot use 'in' operator to search for 'integrity' in
      # undefined"), unrelated to any change in this repo.
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter schlussel lint
      - run: pnpm --filter schlussel test

  web:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      # schloss-ui is a git submodule, linked via pnpm's workspace:*
      # protocol - needs to be checked out and built before web can
      # import from it.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      # Pinned exactly - "version: 11" lets the action self-update to
      # whatever the latest 11.x is at run time, which broke CI when
      # pnpm 11.12.0 shipped with an internal bug in the self-installer
      # ("Cannot use 'in' operator to search for 'integrity' in
      # undefined"), unrelated to any change in this repo.
      - uses: pnpm/action-setup@v6
        with:
          version: 11.7.0

      - uses: actions/setup-node@v6
        with:
          node-version: 26
          cache: pnpm

      - run: pnpm install --frozen-lockfile
      - run: pnpm --filter @zudar107/schloss-ui build
      - run: pnpm --filter web lint
      - run: pnpm --filter web test
