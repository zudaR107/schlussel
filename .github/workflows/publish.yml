name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    strategy:
      matrix:
        include:
          - image: schlussel
            dockerfile: Dockerfile
          - image: schlussel-web
            dockerfile: web/Dockerfile
    steps:
      # schloss-ui is a git submodule - needs to be checked out so it's
      # present in the build context these Dockerfiles COPY from.
      - uses: actions/checkout@v4
        with:
          submodules: recursive

      - uses: docker/setup-buildx-action@v4

      - uses: docker/login-action@v4
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v7
        with:
          context: .
          file: ${{ matrix.dockerfile }}
          push: true
          # ghcr.io requires lowercase; github.repository_owner preserves
          # the account's display case (zudaR107), so it's hardcoded here
          # rather than templated.
          tags: |
            ghcr.io/zudar107/${{ matrix.image }}:latest
            ghcr.io/zudar107/${{ matrix.image }}:${{ github.sha }}
