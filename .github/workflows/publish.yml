name: Publish

on:
  push:
    branches: [main]

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write
    steps:
      - uses: actions/checkout@v4

      - uses: docker/setup-buildx-action@v3

      - uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          # ghcr.io requires lowercase; github.repository_owner preserves
          # the account's display case (zudaR107), so it's hardcoded here
          # rather than templated.
          tags: |
            ghcr.io/zudar107/schlussel:latest
            ghcr.io/zudar107/schlussel:${{ github.sha }}
